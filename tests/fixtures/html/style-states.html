<!doctype html>
<html>
  <head>
    <style>
      .btn-primary {
        background-color: #155eef;
        color: #ffffff;
        border: 1px solid #155eef;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        padding: 12px 18px;
      }
      .btn-primary:hover {
        background-color: #004eeb;
        border-color: #004eeb;
      }
      .btn-primary:focus {
        border-color: #84caff;
        box-shadow: 0 0 0 4px rgba(132, 202, 255, 0.35);
      }
      .btn-primary:disabled {
        background-color: #d0d5dd;
        color: #667085;
        border-color: #d0d5dd;
      }
      .btn-primary:active {
        background-color: #00359e;
        border-color: #00359e;
      }
    </style>
  </head>
  <body>
    <button class="btn-primary">Save</button>
  </body>
</html>
