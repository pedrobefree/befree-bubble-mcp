name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q
      - run: python -m bubble_mcp.cli.main smoke runtime --suite coverage
      - run: python -m bubble_mcp.cli.main smoke runtime --suite agent-routing
      - run: python -m ruff check src tests scripts
      - run: python -m mypy src
      - run: python scripts/audit_sensitive_paths.py .
      - run: npm test
